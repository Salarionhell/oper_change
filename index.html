<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Операционная панель — кредитная карта</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    :root {
      --bg-main: #f8f9fa;
      --card-bg: #ffffff;
      --primary: #c62828;
      --primary-dark: #8e0000;
      --primary-soft: #ffebee;
      --text-main: #212121;
      --text-muted: #757575;
      --border-soft: #e0e0e0;
      --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius-card: 12px;
      --transition-fast: 0.2s ease-in-out;
      --error: #d32f2f;
      --success: #2e7d32;
      --warning: #ed6c02;
      --info: #0288d1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Top bar */

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 200;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      padding: 8px 20px;
    }

    .top-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .tab-bar {
      display: flex;
      gap: 3px;
      flex-wrap: nowrap;
      min-width: 0;
      flex: 1;
    }

	.tab {
	display: inline-flex;
	align-items: center;
	gap: 4px;
	padding: 5px 10px;        /* было 3px 5px */
	border-radius: 999px;
	border: 1px solid transparent;
	font-size: 12px;           /* было 11px */
	cursor: pointer;
	background-color: #f1f1f1;
	color: var(--text-main);
	transition: var(--transition-fast);
	min-width: 0;
	flex: 0 1 auto;
	max-width: 220px;          /* увеличили видимую длину названий вкладок */
	overflow: hidden;
	}

    .tab span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-main {
      font-weight: 600;
    }

    .tab.active {
      background-color: var(--primary-soft);
      color: var(--primary-dark);
      border-color: #f8c1c1;
    }

    .tab-close-btn {
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 10px;
      flex-shrink: 0;
    }

    .session-indicator {
      font-size: 13px;
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition-fast);
      background-color: var(--primary);
      color: #ffffff;
    }

    .btn.secondary {
      background-color: #f1f1f1;
      color: var(--text-main);
    }

    .btn.outline {
      background-color: #ffffff;
      color: var(--text-main);
      border: 1px solid var(--border-soft);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .btn:not(:disabled):hover {
      filter: brightness(0.95);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    /* Sticky info bar */

    .sticky-info {
      position: sticky;
      top: 46px;
      z-index: 190;
      background-color: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      padding: 6px 20px 8px;
      border-top: 1px solid #f0f0f0;
    }

    .sticky-inner {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .client-fio {
      font-size: 13px;
      font-weight: 700;
      gap: 6px;
      color: var(--primary-dark);
      background-color: var(--primary-soft);
      padding: 4px 12px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .client-avatar {
      display: flex;
      align-items: center;
      gap: 6px;
      background-color: var(--primary-soft);
      border-radius: 999px;
      padding: 4px 10px 4px 4px;
      font-size: 13px;
      font-weight: 500;
    }

    .client-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background-color: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .sticky-blocks {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sticky-item {
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 999px;
      background-color: #f5f5f5;
      cursor: pointer;
      transition: var(--transition-fast);
      position: relative;
    }

    .sticky-item:hover {
      background-color: var(--primary-soft);
      color: var(--primary-dark);
    }

    .sticky-item-label {
      pointer-events: none;
    }

    /* Dropdowns */

    .dropdown {
      position: absolute;
      top: 34px;
      left: 0;
      min-width: 260px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.2);
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text-main);
      display: none;
      z-index: 210;
    }

    .dropdown.open {
      display: block;
    }

    /* Только для дропдауна транзакций – уменьшенная ширина */
    #dropdown-transactions {
      min-width: 200px;
    }

    /* Строка с иконкой и текстом */
    .dropdown-line {
      display: grid;
      grid-template-columns: 24px 1fr;  /* вернули ширину 24px */
      gap: 6px;
      margin-bottom: 6px;
      align-items: start;
    }

    .dropdown-line i {
      font-size: 14px;  /* вернули размер иконок к исходному 14px */
      color: var(--primary-dark);
      margin-top: 2px;
      text-align: center;
    }

    .dropdown-line span {
      line-height: 1.4;
      white-space: normal;
      word-break: break-word;
    }

    /* Для транзакций без иконок */
    .dropdown-line.no-icon {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .dropdown-line.no-icon span {
      text-align: left;
    }

    /* Транзакции в выпадающем списке: сгруппированы по дате */
    .dropdown-transaction-group {
      margin-bottom: 10px;
    }

    .dropdown-transaction-group .transaction-date {
      font-weight: 700;
      text-align: center;
      display: block;
      margin-bottom: 4px;
    }

    .dropdown-transaction-group .transaction-detail {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      padding-left: 8px;
      margin-bottom: 2px;
    }

    .dropdown-transaction-group .detail-amount {
      font-weight: 600;
    }
    .dropdown-transaction-group .detail-amount.amount-positive {
      color: var(--success);
    }
    .dropdown-transaction-group .detail-amount.amount-negative {
      color: var(--error);
    }

    .dropdown-more {
      text-align: right;
      margin-top: 4px;
    }

    .dropdown-more a {
      cursor: pointer;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 18px;
      padding: 4px 8px;
      display: inline-block;
      border-radius: 4px;
      transition: background-color 0.2s;
      position: relative;
    }

    .dropdown-more a:hover {
      background-color: #f0f0f0;
    }

    .dropdown-more a:hover::after {
      content: "Открыть подробную информацию";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #333;
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 300;
    }

    /* Main layout */

    .app-main {
      padding: 12px 20px 24px;
    }

    .columns-main {
      display: grid;
      grid-template-columns: 2fr 1.2fr;
      gap: 14px;
      align-items: flex-start;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Recommended operations */

    .recommended-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .recommended-card {
      flex: 1 1 150px;
      min-width: 150px;
      background: linear-gradient(135deg, #ffffff, #ffebee);
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid #f4c4c4;
      cursor: pointer;
      font-size: 13px;
      transition: var(--transition-fast);
    }

    .recommended-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    /* Open requests */

    .requests-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .request-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background-color: #ffffff;
      margin-bottom: 6px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .request-item:hover {
      background-color: #ffebee;
    }

    .request-icon {
      color: var(--primary);
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    .request-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .request-title {
      font-weight: 500;
      font-size: 13px;
    }

    .request-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .request-date {
      color: var(--text-muted);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
    }

    .badge-success {
      background-color: var(--success);
    }
    .badge-error {
      background-color: var(--error);
    }
    .badge-warning {
      background-color: var(--warning);
    }
    .badge-info {
      background-color: var(--info);
    }

    /* Search */

    .search-row {
      margin-top: 12px;
    }

    .search-container {
      position: relative;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      padding: 8px 32px 8px 28px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      font-size: 13px;
      outline: none;
      background-color: #ffffff;
      transition: var(--transition-fast);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.15);
    }

    .search-icon-left {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Operation tiles – увеличенные окошки */
    .operations-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .operations-column {
      background-color: #ffffff;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 8px 10px 10px;
    }

    .operations-column-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .operations-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; /* увеличили отступ */
    }

    .operation-tile {
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 10px 6px;
      font-size: 13px;
      cursor: pointer;
      background-color: #ffffff;
      transition: var(--transition-fast);
      text-align: center;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }

    .operation-tile-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .operation-tile:hover {
      background-color: #ffebee;
      border-color: var(--primary);
    }

    /* Tab content wrapper */

    .tab-content-wrapper {
      margin-top: 12px;
    }

    /* Info tab content */

    .info-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .info-table td {
      border: 1px solid var(--border-soft);
      padding: 5px 7px;
      vertical-align: top;
    }

    .info-table td:first-child {
      width: 32%;
      background-color: #fafafa;
      font-weight: 500;
    }

    .list-block {
      font-size: 13px;
    }

    .list-block ul {
      padding-left: 18px;
      margin: 4px 0 0;
    }

    /* Portfolio spacing */
    .portfolio-section {
      margin-bottom: 20px;
    }
    .portfolio-section:last-child {
      margin-bottom: 0;
    }

    /* Transactions table */
    .transactions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .transactions-table th,
    .transactions-table td {
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      text-align: left;
    }
    .transactions-table th {
      background-color: #f5f5f5;
    }

    /* SMS table */
    .sms-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sms-table th,
    .sms-table td {
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      text-align: left;
      font-size: 12px;
    }

    /* Саммари обращений и коммуникаций (вкладка info / cases) */
    .cases-summary-card {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: var(--radius-card);
      border: 1px solid var(--border-soft);
      background: linear-gradient(135deg, #fff8f8 0%, #ffffff 100%);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }
    .cases-summary-head {
      margin-bottom: 6px;
    }
    .cases-summary-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cases-summary-body {
      font-size: 12px;
      line-height: 1.45;
      color: var(--text-main);
    }
    .cases-summary-body p {
      margin: 0 0 6px;
    }
    .cases-summary-body p:last-child {
      margin-bottom: 0;
    }
    .cases-summary-body ul,
    .cases-summary-body ol {
      margin: 4px 0 4px 18px;
      padding: 0;
    }
    .cases-summary-body li {
      margin: 2px 0;
    }
    .cases-summary-loading {
      color: var(--text-muted);
      font-style: italic;
    }
    .cases-summary-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
    }
    .sms-table th {
      background-color: #f5f5f5;
    }
    .sms-table th:nth-child(1),
    .sms-table td:nth-child(1),
    .sms-table th:nth-child(2),
    .sms-table td:nth-child(2) {
      text-align: center;
    }

    /* Simple operation content */

    .op-simple-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .op-simple-steps {
      list-style: decimal;
      padding-left: 18px;
      font-size: 13px;
    }

    .op-simple-steps li {
      margin-bottom: 4px;
    }

    /* Card wizard */

    .wizard-layout {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      gap: 12px;
    }

    .wizard-steps-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .wizard-step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      background-color: #fafafa;
    }

    .wizard-step-item.current {
      border-color: var(--primary);
      background-color: var(--primary-soft);
    }

    .wizard-step-item.completed {
      border-color: #c8e6c9;
      background-color: #e8f5e9;
    }

    .wizard-step-index {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      background-color: #ffffff;
    }

    .wizard-step-item.completed .wizard-step-index {
      background-color: #4caf50;
      color: #ffffff;
      border-color: #4caf50;
    }

    .wizard-step-title-main {
      font-size: 13px;
    }

    .wizard-form-section {
      font-size: 13px;
    }

    .wizard-form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .wizard-form-title {
      font-size: 15px;
      font-weight: 600;
    }

    .wizard-form-sub {
      display: none; /* скрыто */
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .form-label {
      font-size: 12px;
    }

    .form-control,
    .form-select,
    .form-textarea {
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
      background-color: #ffffff;
      transition: var(--transition-fast);
    }

    .form-control:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.15);
    }

    .form-textarea {
      min-height: 70px;
      resize: vertical;
    }

    .checkbox-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .form-error {
      font-size: 11px;
      color: var(--error);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 6px;
    }

    .radio-card {
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 8px;
      display: flex;
      flex-direction: column; /* картинка сверху, текст снизу */
      gap: 6px;
      align-items: flex-start;
      cursor: pointer;
      background-color: #ffffff;
      font-size: 13px;
    }

    .radio-card.selected {
      border-color: var(--primary);
      background-color: #ffebee;
    }

    /* изображение карты в мастере — без "иконок", просто картинка сопоставимого размера */
    .card-choice-img,
    .radio-card > img.card-choice-img,
    .radio-card img.card-choice-img {
      display: block !important;
      width: 100% !important;
      min-width: 260px !important;
      max-width: 320px !important;
      max-height: 190px !important; /* чтобы высокая первая карта не была слишком большой */
      height: auto !important;
      margin-bottom: 6px;
      border-radius: 8px;
      object-fit: contain;
    }
    /* если где-то осталась обёртка .card-type-img — не даём ей сжимать картинку */
    .radio-card .card-type-img {
      width: 100% !important;
      max-width: 320px !important;
      min-width: 260px !important;
      height: auto !important;
      min-height: 80px !important;
      background: transparent !important;
      padding: 0 !important;
    }
    .radio-card .card-type-img img {
      width: 100% !important;
      height: auto !important;
      max-width: 100% !important;
      display: block !important;
    }
    .options-list .radio-card {
      min-width: 280px;
    }

    .radio-card-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .radio-card-text-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .radio-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .document-block {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
      background-color: #fafafa;
      font-size: 13px;
    }

    .document-block i {
      color: var(--primary-dark);
      font-size: 18px;
    }

    .photo-preview-img {
      max-width: 200px;
      max-height: 180px;
      border-radius: 8px;
      border: 1px solid var(--border-soft);
    }

    .contract-text {
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background-color: #fafafa;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .summary-table td {
      border: 1px solid var(--border-soft);
      padding: 3px 6px;
    }

    .summary-table td:first-child {
      width: 38%;
      background-color: #fafafa;
      font-weight: 500;
    }

    .wizard-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    /* Modal (SMS, request details, confirmation) */

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 220;
    }

    .modal {
      background-color: #ffffff;
      border-radius: 14px;
      padding: 14px 16px 12px;
      max-width: 380px;
      width: calc(100% - 40px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      font-size: 13px;
    }

    .modal-title {
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    /* Custom confirm */
    .confirm-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    /* Чат-бот помощник */
    .chat-bot-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 180;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(198, 40, 40, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: var(--transition-fast);
    }
    .chat-bot-toggle:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(198, 40, 40, 0.5);
    }
    .chat-bot-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      z-index: 181;
      width: 360px;
      max-width: calc(100vw - 40px);
      height: 420px;
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      display: none;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border-soft);
    }
    .chat-bot-panel.open {
      display: flex;
    }
    .chat-bot-header {
      padding: 10px 12px;
      background: var(--primary-soft);
      border-bottom: 1px solid #f4c4c4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 14px;
      color: var(--primary-dark);
    }
    .chat-bot-close {
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
    }
    .chat-bot-close:hover {
      color: var(--primary-dark);
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 8px 10px;
      border-radius: 10px;
      line-height: 1.4;
      word-break: break-word;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .chat-msg p { margin: 0 0 6px; }
    .chat-msg p:last-child { margin-bottom: 0; }
    .chat-msg ul, .chat-msg ol { margin: 6px 0 6px 18px; padding: 0; }
    .chat-msg li { margin: 2px 0; }
    .chat-msg h1, .chat-msg h2, .chat-msg h3, .chat-msg h4, .chat-msg h5, .chat-msg h6 {
      margin: 6px 0;
      font-size: 13px;
      font-weight: 700;
    }
    .chat-msg pre {
      margin: 6px 0;
      padding: 8px;
      border-radius: 8px;
      background: rgba(0,0,0,0.06);
      overflow: auto;
      white-space: pre;
    }
    .chat-msg code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }
    .chat-msg table {
      border-collapse: collapse;
      width: 100%;
      margin: 6px 0;
      font-size: 12px;
      display: block;
      overflow-x: auto;
    }
    .chat-msg th, .chat-msg td {
      border: 1px solid rgba(0,0,0,0.12);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    .chat-msg thead th {
      background: rgba(0,0,0,0.04);
      font-weight: 700;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--primary-soft);
      color: var(--primary-dark);
      border-bottom-right-radius: 2px;
    }
    .chat-msg.bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: var(--text-main);
      border-bottom-left-radius: 2px;
    }
    .chat-msg.bot.typing {
      color: var(--text-muted);
      font-style: italic;
    }
    .chat-bot-form {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .chat-bot-form input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      font-size: 13px;
      outline: none;
    }
    .chat-bot-form input:focus {
      border-color: var(--primary);
    }
    .chat-bot-form button {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-bot-form button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    /* Responsive */

    @media (max-width: 1024px) {
      .columns-main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        padding-inline: 10px;
      }
      .sticky-info {
        padding-inline: 10px;
      }
      .app-main {
        padding-inline: 10px;
      }
      .wizard-layout {
        grid-template-columns: 1fr;
      }
      .operations-columns {
        grid-template-columns: 1fr;
      }

    // ---------------- CUSTOM CONFIRM ----------------

    function showConfirm(message, onYes, onNo) {
      const backdrop = document.getElementById('confirm-backdrop');
      const msgEl = document.getElementById('confirm-message');
      msgEl.textContent = message;
      backdrop.style.display = 'flex';

      const yesBtn = document.getElementById('confirm-yes');
      const noBtn = document.getElementById('confirm-no');

      const handleYes = () => {
        backdrop.style.display = 'none';
        yesBtn.removeEventListener('click', handleYes);
        noBtn.removeEventListener('click', handleNo);
        if (onYes) onYes();
      };

      const handleNo = () => {
        backdrop.style.display = 'none';
        yesBtn.removeEventListener('click', handleYes);
        noBtn.removeEventListener('click', handleNo);
        if (onNo) onNo();
      };

      yesBtn.addEventListener('click', handleYes);
      noBtn.addEventListener('click', handleNo);
    }

    function showAlert(message, callback) {
      const backdrop = document.getElementById('modal-backdrop');
      const titleEl = document.getElementById('modal-title');
      const bodyEl = document.getElementById('modal-body');
      const actionsEl = document.getElementById('modal-actions');
      titleEl.innerHTML = `<i class="fa-solid fa-info-circle"></i> Внимание`;
      bodyEl.innerHTML = `<p>${message}</p>`;
      actionsEl.innerHTML = '';
      const btn = document.createElement('button');
      btn.className = 'btn secondary';
      btn.textContent = 'OK';
      btn.addEventListener('click', () => {
        backdrop.style.display = 'none';
        if (callback) callback();
      });
      actionsEl.appendChild(btn);
      backdrop.style.display = 'flex';
    }

    // ---------------- HELPERS ----------------

    const qs = (sel) => document.querySelector(sel);
    const qsa = (sel) => Array.from(document.querySelectorAll(sel));

    function findTabByType(type, key) {
      if (type === 'info') return state.tabs.find(t => t.type === 'info' && t.payload.infoType === key);
      if (type === 'operation') return state.tabs.find(t => t.type === 'operation' && t.payload.operationName === key);
      return null;
    }

    function createTab(title, type, payload = {}) {
      // если такая вкладка уже существует, просто активируем её
      const existing = findTabByType(type, type === 'info' ? payload.infoType : payload.operationName);
      if (existing) {
        setActiveTab(existing.id);
        return existing;
      }
      const tab = {
        id: `tab-${state.nextTabId++}`,
        title,
        type,
        payload,
      };
      state.tabs.push(tab);
      state.activeTabId = tab.id;
      renderTabs();
      renderActiveTabContent();
      return tab;
    }

    function setActiveTab(id) {
      state.activeTabId = id;
      renderTabs();
      renderActiveTabContent();
    }

    function closeTab(id, options = {}) {
      const tab = state.tabs.find((t) => t.id === id);
      if (!tab) return;

      const idx = state.tabs.findIndex((t) => t.id === id);
      state.tabs.splice(idx, 1);
      
      // Если закрыли активную вкладку, переключаемся на главную
      if (state.activeTabId === id) {
        const mainTab = state.tabs.find(t => t.type === 'main');
        state.activeTabId = mainTab ? mainTab.id : (state.tabs.length ? state.tabs[0].id : null);
      }
      
      renderTabs();
      renderActiveTabContent();
    }

    function ensureMainTab() {
      if (!state.tabs.some((t) => t.type === "main")) {
        const mainTab = {
          id: "tab-main",
          title: "Главная",
          type: "main",
          payload: {},
        };
        state.tabs.unshift(mainTab);
        state.activeTabId = mainTab.id;
      }
    }

    // ---------------- COMMUNICATIONS SUMMARY (вкладка «Обращения и коммуникации») ----------------
    const communicationsSummaryCache = {
      sourceHash: null,
      summaryText: null,
      forceNext: false,
    };

    /** Вызовите после обновления данных обращений из API — саммари пересчитается при следующем открытии вкладки. */
    function invalidateCommunicationsSummaryCache() {
      communicationsSummaryCache.sourceHash = null;
      communicationsSummaryCache.summaryText = null;
      communicationsSummaryCache.forceNext = true;
    }
    window.invalidateCommunicationsSummaryCache = invalidateCommunicationsSummaryCache;

    function hashCommunicationsSource(s) {
      let h = 2166136261;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return String(h >>> 0);
    }

    /** «Последний месяц» для саммари: последние 30 дней включительно (по дате заявки). */
    const COMMUNICATIONS_SUMMARY_LAST_DAYS = 30;

    function parseCaseDateDDMMYYYY(str) {
      if (!str || typeof str !== "string") return null;
      const m = str.trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (!m) return null;
      const d = parseInt(m[1], 10);
      const mo = parseInt(m[2], 10) - 1;
      const y = parseInt(m[3], 10);
      const dt = new Date(y, mo, d);
      if (
        dt.getFullYear() !== y ||
        dt.getMonth() !== mo ||
        dt.getDate() !== d
      )
        return null;
      return dt;
    }

    function isDateWithinLastMonthForSummary(date) {
      if (!date) return false;
      const now = new Date();
      const end = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        23,
        59,
        59,
        999
      );
      const start = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate()
      );
      start.setDate(start.getDate() - (COMMUNICATIONS_SUMMARY_LAST_DAYS - 1));
      start.setHours(0, 0, 0, 0);
      return date >= start && date <= end;
    }

    function pushCaseLines(lines, arr, startIndex) {
      arr.forEach((c, j) => {
        const i = startIndex + j;
        lines.push(
          `${i}. ${c.title} | дата ${c.date} | статус: ${c.status} | менеджер: ${c.manager || "—"} | канал: ${c.source || "—"}`
        );
        if (c.extra) lines.push(`   дополнительно: ${c.extra}`);
        if (c.place) lines.push(`   место выдачи/отделение: ${c.place}`);
      });
    }

    function buildCommunicationsContextForSummary() {
      const lines = [];
      const needAction = casesFull.filter((c) => c.status === "оформить");
      lines.push("=== Оформить ===");
      if (needAction.length === 0) {
        lines.push("(нет записей)");
      } else {
        pushCaseLines(lines, needAction, 1);
      }
      lines.push("");
      const inProgress = casesFull.filter((c) => c.status === "в обработке");
      lines.push("=== В обработке ===");
      if (inProgress.length === 0) {
        lines.push("(нет записей)");
      } else {
        pushCaseLines(lines, inProgress, 1);
      }
      lines.push("");
      const terminalRecent = casesFull.filter((c) => {
        if (!["отклонено", "выполнено", "одобрено"].includes(c.status))
          return false;
        const d = parseCaseDateDDMMYYYY(c.date);
        return isDateWithinLastMonthForSummary(d);
      });
      lines.push("=== Отклонено / Выполнено / Одобрено ===");
      if (terminalRecent.length === 0) {
        lines.push("(нет записей)");
      } else {
        pushCaseLines(lines, terminalRecent, 1);
      }
      return lines.join("\n");
    }

    function buildFallbackCommunicationsSummary() {
      const needAction = casesFull.filter((c) => c.status === "оформить");
      const inProgress = casesFull.filter((c) => c.status === "в обработке");
      const rejected = casesFull.filter((c) => {
        if (c.status !== "отклонено") return false;
        return isDateWithinLastMonthForSummary(
          parseCaseDateDDMMYYYY(c.date)
        );
      });
      const done = casesFull.filter((c) => {
        if (c.status !== "выполнено") return false;
        return isDateWithinLastMonthForSummary(
          parseCaseDateDDMMYYYY(c.date)
        );
      });
      const approved = casesFull.filter((c) => {
        if (c.status !== "одобрено") return false;
        return isDateWithinLastMonthForSummary(
          parseCaseDateDDMMYYYY(c.date)
        );
      });
      return [
        `За весь период — оформить: ${needAction.length}; в обработке: ${inProgress.length}.`,
        `За последние ${COMMUNICATIONS_SUMMARY_LAST_DAYS} дн.: отклонено ${rejected.length}, выполнено ${done.length}, одобрено ${approved.length}.`,
        "При необходимости уточните у клиента детали по отклонённым заявкам.",
      ].join(" ");
    }

    function renderCommunicationsSummaryHtml(container, text) {
      if (!container) return;
      const raw = String(text || "").trim();
      if (!raw) {
        container.innerHTML =
          '<span class="cases-summary-loading">Нет данных для саммари.</span>';
        return;
      }
      if (window.marked && window.DOMPurify) {
        window.marked.setOptions({
          gfm: true,
          breaks: true,
          headerIds: false,
          mangle: false,
        });
        const html = window.marked.parse(raw);
        container.innerHTML = window.DOMPurify.sanitize(html, {
          USE_PROFILES: { html: true },
        });
      } else {
        container.textContent = raw;
      }
    }

    async function fetchCommunicationsSummaryFromAi(contextText) {
      const cfg = CHAT_BOT_CONFIG;
      if (!cfg.apiUrl || !cfg.apiUrl.trim()) {
        return buildFallbackCommunicationsSummary();
      }
      const limitedContext =
        contextText.length > 12000
          ? contextText.slice(0, 11999) + "…"
          : contextText;
      const systemPrompt =
        "Ты — помощник менеджера отделения Альфа‑Банка. Сделай краткое саммари по фактам из списка обращений клиента (таблица «Обращения и коммуникации»). Не используй данные из других источников.\n" +
        "Структура данных: три блока — «Оформить», «В обработке», «Отклонено / Выполнено / Одобрено». В третьем блоке перечислены только заявки со статусами отклонено/выполнено/одобрено и датой заявки за последние 30 дней; первые два блока — все текущие записи с соответствующим статусом. Не смешивай блоки между собой.\n" +
        "Правила:\n" +
        "- Только факты из переданных данных; не выдумывай.\n" +
        "- 2–5 коротких предложений ИЛИ маркированный список из 3–7 пунктов.\n" +
        "- Каждый пункт и предложение завершай полностью (не обрывай на середине слова). Если не хватает места — уменьши число пунктов, но последний оставшийся пункт должен быть закончен.\n" +
        "- Сначала кратко по блоку «Оформить», затем по «В обработке», затем по финальным статусам из третьего блока (если он не пуст).\n" +
        "- Не дублируй таблицу; дай суть для менеджера.\n" +
        "- Пиши по-русски, деловым тоном без воды.";

      const body = {
        model: cfg.model || "mistral-small-latest",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: "Данные для саммари:\n\n" + limitedContext },
        ],
        temperature: 0.15,
        max_tokens: cfg.communicationsSummaryMaxTokens ?? 480,
      };
      const headers = { "Content-Type": "application/json" };
      if (cfg.apiKey && cfg.apiKey.trim())
        headers["Authorization"] = "Bearer " + cfg.apiKey.trim();

      let res;
      try {
        res = await fetch(cfg.apiUrl, {
          method: "POST",
          headers,
          body: JSON.stringify(body),
        });
      } catch (e) {
        return buildFallbackCommunicationsSummary();
      }
      if (!res.ok) {
        return buildFallbackCommunicationsSummary();
      }
      const data = await res.json();
      const choice0 = data.choices && data.choices[0];
      const text =
        choice0 && choice0.message ? choice0.message.content : null;
      const finishReason = choice0 && choice0.finish_reason;
      if (!text || !String(text).trim())
        return buildFallbackCommunicationsSummary();
      return trimCommunicationsSummaryIfTruncated(
        String(text).trim(),
        finishReason
      );
    }

    /**
     * Если модель уперлась в max_tokens (finish_reason: length), ответ часто обрывается на середине слова.
     * Основное решение — достаточный max_tokens; здесь лёгкая подчистка хвоста.
     */
    function trimCommunicationsSummaryIfTruncated(text, finishReason) {
      let s = String(text || "").trim();
      if (!s || finishReason !== "length") return s;
      if (/[.!?…]\s*$/.test(s)) return s;
      // Удаляем подозрительно короткий последний «хвост» (часто обломок слова при обрезке по токенам)
      const m = s.match(/(?:^|[\s])([А-Яа-яЁёA-Za-z-]{1,4})\s*$/);
      if (m && m[1] && m[1].length <= 4) {
        s = s.slice(0, s.length - m[1].length).replace(/\s+$/, "");
      }
      return s ? s + "…" : text.trim();
    }

    function initCommunicationsSummaryBlock() {
      const bodyEl = qs("#cases-summary-body");
      if (!bodyEl) return;

      const ctx = buildCommunicationsContextForSummary();
      const hash = hashCommunicationsSource(ctx);

      if (
        !communicationsSummaryCache.forceNext &&
        communicationsSummaryCache.sourceHash === hash &&
        communicationsSummaryCache.summaryText
      ) {
        renderCommunicationsSummaryHtml(bodyEl, communicationsSummaryCache.summaryText);
        return;
      }
      communicationsSummaryCache.forceNext = false;

      bodyEl.innerHTML =
        '<span class="cases-summary-loading">Формирую краткий пересказ…</span>';

      fetchCommunicationsSummaryFromAi(ctx).then((text) => {
        communicationsSummaryCache.sourceHash = hash;
        communicationsSummaryCache.summaryText = text;
        renderCommunicationsSummaryHtml(bodyEl, text);
      });
    }

    // ---------------- OPERATION HANDLING ----------------

    function handleOperationClick(name) {
      // Проверка: если уже открыта какая-либо операционная вкладка
      const existingOpTab = state.tabs.find(t => t.type === 'operation');
      if (existingOpTab) {
        // Если открыта та же самая операция – переключаемся на неё
        if (existingOpTab.payload.operationName === name) {
          setActiveTab(existingOpTab.id);
          return;
        } else {
          // Иначе – предупреждение
          showAlert(
            "Сначала завершите текущую операцию или сохраните прогресс.",
            null
          );
          return;
        }
      }

      const openOperation = () => {
        if (name === "Карты") {
          // Восстанавливаем прогресс из сохранённого или создаём новый
          if (state.savedCardWizard) {
            state.cardWizard = JSON.parse(JSON.stringify(state.savedCardWizard));
            state.cardWizardFinished = false;
            state.savedCardWizard = null;
          } else if (!state.cardWizard || state.cardWizardFinished) {
            state.cardWizard = createCardWizardState();
            state.cardWizardFinished = false;
          }
          createTab("Оформление кредитной карты", "operation", {
            operationName: "Карты",
          });
        } else if (name === "Изменение персональных данных") {
          if (state.savedPersonalDataWizard) {
            state.personalDataWizard = JSON.parse(
              JSON.stringify(state.savedPersonalDataWizard),
            );
            state.personalDataWizardFinished = false;
            state.savedPersonalDataWizard = null;
          } else if (
            !state.personalDataWizard ||
            state.personalDataWizardFinished
          ) {
            state.personalDataWizard = createPersonalDataWizardState();
            state.personalDataWizardFinished = false;
          }
          createTab("Изменение персональных данных", "operation", {
            operationName: "Изменение персональных данных",
          });
        } else {
          createTab(name, "operation", { operationName: name });
        }
      };

      if (!state.sessionActive) {
        pendingOperationAfterSms = name;
        openSmsModal();
      } else {
        openOperation();
      }
    }

    function goToCardReissueFromPersonalData() {
      const personalTab = findTabByType(

    function initPersonalDataWizardHandlers() {
      const w = state.personalDataWizard;
      if (!w) return;
      const d = w.data;
      const step = w.currentStep;
      const total = personalDataWizardStepTitles.length;

      if (step === 1) {
        const el = qs("#pd-document-verified");
        if (el)
          el.addEventListener(
            "change",
            (e) => (d.documentVerified = e.target.checked),
          );
      } else if (step === 2) {
        const sn = qs("#pd-new-surname");
        if (sn)
          sn.addEventListener(
            "input",
            (e) => (d.newSurname = e.target.value),
          );
        const sel = qs("#pd-reason");
        if (sel) {
          sel.value = d.reason || "";
          sel.addEventListener("change", (e) => (d.reason = e.target.value));
        }
      } else if (step === 3) {
        const el = qs("#pd-checks-ok");
        if (el)
          el.addEventListener(
            "change",
            (e) => (d.checksOk = e.target.checked),
          );
      } else if (step === 4) {
        const el = qs("#pd-confirm-change");
        if (el)
          el.addEventListener(
            "change",
            (e) => (d.confirmChange = e.target.checked),
          );
      }

      const btnPrev = qs("#pd-btn-prev");
      const btnNext = qs("#pd-btn-next");
      if (!btnPrev || !btnNext) return;

      btnPrev.addEventListener("click", () => {
        if (w.currentStep > 1) {
          w.currentStep -= 1;
          renderActiveTabContent();
        }
      });

      btnNext.addEventListener("click", () => {
        if (w.currentStep === total) {
          goToCardReissueFromPersonalData();
          return;
        }
        const ok = validatePersonalDataWizardStep();
        if (!ok) {
          renderActiveTabContent();
          return;
        }
        if (w.currentStep === 4) {
          w.applicationNumber =
            w.applicationNumber ||
            "PD-2026-" + String(Date.now()).slice(-8);
        }
        w.currentStep += 1;
        renderActiveTabContent();
      });
    }

    function createPersonalDataWizardState() {
      const fio = clientInfoFull.fio || "";

      const surname = parts[0] || "";
      const name = parts[1] || "";
      const patronymic = parts.slice(2).join(" ") || "";
      return {
        currentStep: 1,
        applicationNumber: null,
        data: {
          oldSurname: surname,
          newSurname: "",
          name,
          patronymic,
          passportSeries: clientInfoFull.passportSeries || "",

        },

      };

    function validatePersonalDataWizardStep() {
      const w = state.personalDataWizard;
      if (!w) return false;
      const d = w.data;
      const errors = {};
      switch (w.currentStep) {
        case 1:
          if (!d.documentVerified)
            errors.documentVerified =
              "Необходимо подтвердить сверку документа с клиентом";
          break;
        case 2:
          if (!String(d.newSurname || "").trim())
            errors.newSurname = "Укажите новую фамилию";
          else if (
            String(d.newSurname).trim().toLowerCase() ===
            String(d.oldSurname || "").trim().toLowerCase()
          )
            errors.newSurname = "Новая фамилия должна отличаться от текущей";
          if (!d.reason) errors.reason = "Выберите основание изменения";
          break;
        case 3:
          if (!d.checksOk)
            errors.checksOk = "Подтвердите завершение проверок в системе";
          break;
        case 4:
          if (!d.confirmChange)
            errors.confirmChange =
              "Необходимо подтвердить регистрацию изменения фамилии";
          break;
        default:
          break;
      }
      w.errors = errors;
      return Object.keys(errors).length === 0;
    }

    function validateCurrentWizardStep() {
      const w = state.cardWizard;
      const d = w.data;
      const errors = {};
      switch (w.currentStep) {
        case 1:
          if (!d.fio.trim()) errors.fio = "Укажите ФИО";
          if (!d.birthDate) errors.birthDate = "Укажите дату рождения";
          if (!d.passportNumber.trim())
            errors.passportNumber = "Укажите номер паспорта";
          if (!d.passportIssuer.trim())
            errors.passportIssuer = "Укажите кем выдан паспорт";
          if (!d.passportIssueDate)
            errors.passportIssueDate = "Укажите дату выдачи";
          if (!d.passportDeptCode.trim())
            errors.passportDeptCode = "Укажите код подразделения";
          if (!d.confirmPersonal)
            errors.confirmPersonal =
              "Необходимо подтвердить корректность данных";
          break;
		case 2: {
		const incomeStr = String(d.income || "").trim();
		if (!incomeStr) {
		errors.income = "Укажите ежемесячный доход";
		} else {
		// Проверка на ведущий ноль (не допускается, если длина >1)
		if (incomeStr.length > 1 && incomeStr.startsWith('0')) {
			errors.income = "Число не должно начинаться с нуля";
		} else {
		const num = Number(incomeStr.replace(/\s/g, ""));
		if (isNaN(num) || num <= 0) {
			errors.income = "Укажите положительный доход (больше 0)";
		}
		}
		}
          if (!d.familyStatus)
            errors.familyStatus = "Выберите семейное положение";
          break;
        }
        case 3:
          if (!d.cardType) errors.cardType = "Выберите тип карты";
          break;
        case 5:
          if (!d.photoUploaded)
            errors.photoUploaded = "Подтвердите, что фото загружено";
          break;
        case 6:
          if (!d.agreeProduct)
            errors.agreeProduct =
              "Необходимо подтвердить условия оформления";
          break;
        case 7:
          if (!d.documentsSigned)
            errors.documentsSigned = "Необходимо подтвердить, что документы подписаны";
          break;
        default:
          break;
      }
      w.errors = errors;
      return Object.keys(errors).length === 0;
    }
