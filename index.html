                <tr><td>Дата выдачи</td><td>${d.passportIssueDate}</td></tr>
                <tr><td>Доход</td><td>${d.income}</td></tr>
                <tr><td>Семейное положение</td><td>${d.familyStatus}</td></tr>
                <tr><td>Тип карты</td><td>${d.cardType}</td></tr>
                <tr><td>Желаемый лимит</td><td>${
                  d.limit ? d.limit + " ₽" : "по стандарту"
                }</td></tr>
                <tr><td>Ставка</td><td>${d.rate}</td></tr>
                <tr><td>Опции</td><td>${
                  [
                    d.optSms && "SMS-информирование",
                    d.optInsurance && "Страхование",
                    d.optLoyalty && "Программа лояльности",
                  ]
                    .filter(Boolean)
                    .join(", ") || "—"
                }</td></tr>
              </table>
              <div class="form-group">
                <label class="checkbox-inline">
                  <input type="checkbox" id="agreeProduct" ${
                    d.agreeProduct ? "checked" : ""
                  } />
                  <span>Я ознакомлен с условиями и подтверждаю оформление</span>
                </label>
                ${
                  w.errors.agreeProduct
                    ? `<div class="form-error">${w.errors.agreeProduct}</div>`
                    : ""
                }
              </div>
            `;
          }
          case 7: {
            const contractTitle = "Договор кредитной карты (стандартные условия)";
            const contractBody = getContractText();
            const contractFileHtml = CREDIT_CARD_CONTRACT_FILE_URL
              ? `<div class="form-group"><a href="${CREDIT_CARD_CONTRACT_FILE_URL}" target="_blank" rel="noopener" class="btn secondary"><i class="fa-solid fa-file-pdf"></i> Открыть договор (файл)</a></div>`
              : "";
            return `
              <div class="form-group">
                <div class="document-block">
                  <i class="fa-solid fa-file-lines"></i>
                  <span>${contractTitle}</span>
                </div>
                ${contractFileHtml}
                <div class="contract-text" id="contract-text">${contractBody}</div>
              </div>
              <div class="form-group">
                <label class="form-label">Комментарий к заявке (необязательно)</label>
                <textarea class="form-textarea" id="comment">${
                  d.comment || ""
                }</textarea>
              </div>
              <div class="form-group">
                <label class="checkbox-inline">
                  <input type="checkbox" id="documentsSigned" ${
                    d.documentsSigned ? "checked" : ""
                  } />
                  <span>Документы подписаны</span>
                </label>
                ${
                  w.errors.documentsSigned
                    ? `<div class="form-error">${w.errors.documentsSigned}</div>`
                    : ""
                }
              </div>
            `;
          }
          case 8: {
            if (!w.applicationNumber) {
              w.applicationNumber = "CC-2026-" + String(Date.now()).slice(-8);
            }
            return `
              <div style="font-size:13px;margin-bottom:8px;">
                Карта успешно заказана. Номер заявки:
                <strong>#${w.applicationNumber}</strong>.<br />
                Ожидайте выпуск карты в течение 3 дней.
              </div>
            `;
          }
          default:
            return "";
        }
      })();

      return `
        <div class="card">
          <div class="wizard-layout">
            <div class="wizard-form-section">
              <div class="wizard-form-header">
                <div class="wizard-form-title">
                  Оформление кредитной карты
                </div>
                <!-- Скрыто по просьбе пользователя -->
              </div>
              ${formContent}
              <div class="wizard-actions">
                <button class="btn secondary" type="button" id="btn-prev" ${
                  step === 1 ? "disabled" : ""
                }>
                  <i class="fa-solid fa-arrow-left"></i> Назад
                </button>
                <button class="btn" type="button" id="btn-next">${
                  step === total
                    ? '<i class="fa-solid fa-check"></i> Завершить'
                    : 'Далее <i class="fa-solid fa-arrow-right"></i>'
                }</button>
              </div>
            </div>
            <div>
              <ul class="wizard-steps-list">
                ${stepsHTML}
              </ul>
            </div>
          </div>
        </div>
      `;
    }

    function renderPersonalDataWizardHTML() {
      const w = state.personalDataWizard || createPersonalDataWizardState();
      state.personalDataWizard = w;
      const step = w.currentStep;
      const total = personalDataWizardStepTitles.length;
      const d = w.data;

      const stepsHTML = personalDataWizardStepTitles
        .map((t, idx) => {
          const stepNum = idx + 1;
          const completed =
            stepNum < step || state.personalDataWizardFinished;
          const current = stepNum === step;
          return `
          <li class="wizard-step-item ${
            completed ? "completed" : ""
          } ${current ? "current" : ""}">
            <div class="wizard-step-index">
              ${
                completed ? '<i class="fa-solid fa-check"></i>' : stepNum
              }
            </div>
            <div class="wizard-step-title-main">${t}</div>
          </li>`;
        })
        .join("");

      const formContent = (() => {
        switch (step) {
          case 1:
            return `
              <p class="wizard-form-sub" style="margin-bottom:10px;">
                Сверьте паспорт клиента с данными в системе. При смене фамилии на пластике кредитной карты останется старая фамилия — потребуется перевыпуск карты (шаг в конце мастера).
              </p>
              <table class="summary-table">
                <tr><td>Фамилия</td><td>${d.oldSurname || "—"}</td></tr>
                <tr><td>Имя</td><td>${d.name || "—"}</td></tr>
                <tr><td>Отчество</td><td>${d.patronymic || "—"}</td></tr>
                <tr><td>Серия и номер паспорта</td><td>${d.passportSeries || ""} ${d.passportNumber || ""}</td></tr>
                <tr><td>Кем выдан</td><td>${d.passportIssuer || "—"}</td></tr>
                <tr><td>Дата выдачи</td><td>${d.passportIssueDate || "—"}</td></tr>
              </table>
              <div class="form-group" style="margin-top:10px;">
                <label class="checkbox-inline">
                  <input type="checkbox" id="pd-document-verified" ${d.documentVerified ? "checked" : ""} />
                  <span>Документ проверен, данные в системе совпадают с оригиналом</span>
                </label>
                ${
                  w.errors.documentVerified
                    ? `<div class="form-error">${w.errors.documentVerified}</div>`
                    : ""
                }
              </div>
            `;
          case 2:
            return `
              <p class="wizard-form-sub" style="margin-bottom:10px;">
                Укажите новую фамилию и основание изменения (в демо доступна только смена фамилии).
              </p>
              <div class="form-grid">
                ${renderInputGroup(
                  "pd-new-surname",
                  "Новая фамилия",
                  d.newSurname,
                  w.errors.newSurname,
                  "text",
                )}
                <div class="form-group">
                  <label class="form-label">Основание изменения</label>
                  <select class="form-select" id="pd-reason">
                    <option value="">Выберите...</option>
                    <option value="marriage" ${d.reason === "marriage" ? "selected" : ""}>Брак / развод</option>
                    <option value="court" ${d.reason === "court" ? "selected" : ""}>Решение суда / смена по документу</option>
                    <option value="fix" ${d.reason === "fix" ? "selected" : ""}>Исправление ошибки в данных</option>
                    <option value="other" ${d.reason === "other" ? "selected" : ""}>Иное</option>
                  </select>
                  ${
                    w.errors.reason
                      ? `<div class="form-error">${w.errors.reason}</div>`
                      : ""
                  }
                </div>
              </div>
            `;
          case 3:
            return `
              <p class="wizard-form-sub" style="margin-bottom:10px;">
                Выполняются автоматические проверки (ФМ, списки, связь с продуктами). В демо — имитация.
              </p>
              <div class="document-block" style="margin-bottom:12px;">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Статус: проверки завершены, критичных замечаний нет</span>
              </div>
              <div class="form-group">
                <label class="checkbox-inline">
                  <input type="checkbox" id="pd-checks-ok" ${d.checksOk ? "checked" : ""} />
                  <span>Проверки в системе завершены, можно фиксировать изменение</span>
                </label>
                ${
                  w.errors.checksOk
                    ? `<div class="form-error">${w.errors.checksOk}</div>`
                    : ""
                }
              </div>
            `;
          case 4: {
            const reasonLabel =
              {
                marriage: "Брак / развод",
                court: "Решение суда / смена по документу",
                fix: "Исправление ошибки",
                other: "Иное",
              }[d.reason] || "—";
            return `
              <p class="wizard-form-sub" style="margin-bottom:10px;">Проверьте данные перед регистрацией в системе.</p>
              <table class="summary-table">
                <tr><td>Текущая фамилия</td><td>${d.oldSurname || "—"}</td></tr>
                <tr><td>Новая фамилия</td><td>${String(d.newSurname || "").trim() || "—"}</td></tr>
                <tr><td>Имя, отчество (без изменений)</td><td>${d.name || ""} ${d.patronymic || ""}</td></tr>
                <tr><td>Основание</td><td>${reasonLabel}</td></tr>
              </table>
              <div class="form-group" style="margin-top:10px;">
                <label class="checkbox-inline">
                  <input type="checkbox" id="pd-confirm-change" ${d.confirmChange ? "checked" : ""} />
                  <span>Зарегистрировать изменение фамилии в системе</span>
                </label>
                ${
                  w.errors.confirmChange
                    ? `<div class="form-error">${w.errors.confirmChange}</div>`
                    : ""
                }
              </div>
            `;
          }
          case 5: {
            if (!w.applicationNumber) {
              w.applicationNumber =
                "PD-2026-" + String(Date.now()).slice(-8);
            }
            return `
              <p style="font-size:13px;margin-bottom:8px;">
                Изменение фамилии зарегистрировано. Номер заявки: <strong>#${w.applicationNumber}</strong>.
              </p>
              <p style="font-size:13px;margin-bottom:12px;color:var(--text-muted);">
                На пластике кредитной карты по-прежнему старая фамилия — для выпуска нового пластика перейдите к операции перевыпуска кредитной карты (тот же мастер, что при выборе «Карты» на главной).
              </p>
            `;
          }
          default:
            return "";
        }
      })();

      const lastStep = step === total;
      const nextLabel = lastStep
        ? '<i class="fa-solid fa-credit-card"></i> Перейти к перевыпуску кредитной карты'
        : 'Далее <i class="fa-solid fa-arrow-right"></i>';

      return `
        <div class="card">
          <div class="wizard-layout">
            <div class="wizard-form-section">
              <div class="wizard-form-header">
                <div class="wizard-form-title">Изменение персональных данных</div>
                <div class="wizard-form-sub">Смена фамилии</div>
              </div>
              ${formContent}
              <div class="wizard-actions">
                <button class="btn secondary" type="button" id="pd-btn-prev" ${
                  step === 1 ? "disabled" : ""
                }>
                  <i class="fa-solid fa-arrow-left"></i> Назад
                </button>
                <button class="btn" type="button" id="pd-btn-next">${nextLabel}</button>
              </div>
            </div>
            <div>
              <ul class="wizard-steps-list">
                ${stepsHTML}
              </ul>
            </div>
          </div>
        </div>
      `;
    }

    function renderInputGroup(
      id,
      label,
      value,
      error,
      type = "text",
      extra = {},
    ) {
      const extraAttrs = [];
      if (extra.min !== undefined) extraAttrs.push(`min="${extra.min}"`);
      if (extra.placeholder)
        extraAttrs.push(`placeholder="${extra.placeholder}"`);
      return `
        <div class="form-group">
          <label class="form-label">${label}</label>
          <input type="${type}" id="${id}" class="form-control" value="${
            value || ""
          }" ${extraAttrs.join(" ")} />
          ${error ? `<div class="form-error">${error}</div>` : ""}
        </div>
      `;
    }

    function renderCardRadio(value, label, desc, selected) {
      const imgUrl = CARD_IMAGE_URLS[value];
      const imgContent = `<img src="${imgUrl}" alt="${label}" class="card-choice-img" />`;
      return `
        <label class="radio-card" data-card-type="${value}">
          ${imgContent}
          <div class="radio-card-text">
            <div class="radio-card-text-header">
              <input type="radio" name="cardType" value="${value}" ${selected ? "checked" : ""} />
              <div>${label}</div>
            </div>
            <div class="radio-desc">${desc}</div>
          </div>
        </label>
      `;
    }

    function renderCheckboxOption(key, label, checked) {
      return `
        <label class="checkbox-inline">
          <input type="checkbox" id="${key}" ${checked ? "checked" : ""} />
          <span>${label}</span>
        </label>
      `;
    }

    function initCardWizardHandlers() {
      const w = state.cardWizard;
      const d = w.data;

      // step-specific bindings
      if (w.currentStep === 1) {
        qs("#fio").addEventListener(
          "input",
          (e) => (d.fio = e.target.value),
        );
        qs("#birthDate").addEventListener(
          "input",
          (e) => (d.birthDate = e.target.value),
        );
        qs("#passportNumber").addEventListener(
          "input",
          (e) => (d.passportNumber = e.target.value),
        );
        qs("#passportIssuer").addEventListener(
          "input",
          (e) => (d.passportIssuer = e.target.value),
        );
        qs("#passportIssueDate").addEventListener(
          "input",
          (e) => (d.passportIssueDate = e.target.value),
        );
        qs("#passportDeptCode").addEventListener(
          "input",
          (e) => (d.passportDeptCode = e.target.value),
        );
        qs("#chk-confirm-personal").addEventListener(
          "change",
          (e) => (d.confirmPersonal = e.target.checked),
        );
      } else if (w.currentStep === 2) {
        qs("#income").addEventListener(
          "input",
          (e) => (d.income = e.target.value),
        );
        qs("#employer").addEventListener(
          "input",
          (e) => (d.employer = e.target.value),
        );
        const famSel = qs("#familyStatus");
        famSel.value = d.familyStatus || "";
        famSel.addEventListener(
          "change",
          (e) => (d.familyStatus = e.target.value),
        );
        qs("#dependents").addEventListener(
          "input",
          (e) => (d.dependents = e.target.value),
        );
      } else if (w.currentStep === 3) {
        qsa("[data-card-type]").forEach((el) => {
          el.addEventListener("click", (e) => {
            const v = el.getAttribute("data-card-type");
            d.cardType = v;
            if (v === "classic") d.rate = "25%";
            if (v === "gold") d.rate = "22%";
            if (v === "platinum") d.rate = "19%";
            renderActiveTabContent();
          });
        });
      } else if (w.currentStep === 4) {
        qs("#limit").addEventListener(
          "input",
          (e) => (d.limit = e.target.value),
        );
        qsa("#optSms,#optInsurance,#optLoyalty").forEach((el) => {
          el.addEventListener("change", (e) => {
            d[e.target.id] = e.target.checked;
          });
        });
      } else if (w.currentStep === 5) {
        const fileInput = qs("#photo-file");
        const previewWrap = qs("#photo-preview-wrap");
        const previewImg = qs("#photo-preview");
        if (d.photoObjectUrl) previewImg.setAttribute("src", d.photoObjectUrl);
        fileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file && file.type.startsWith("image/")) {
            if (d.photoObjectUrl) URL.revokeObjectURL(d.photoObjectUrl);
            d.photoObjectUrl = URL.createObjectURL(file);
            d.photoUploaded = true;
            previewImg.src = d.photoObjectUrl;
            previewWrap.style.display = "block";
          }
        });
      } else if (w.currentStep === 6) {
        qs("#agreeProduct").addEventListener(
          "change",
          (e) => (d.agreeProduct = e.target.checked),
        );
      } else if (w.currentStep === 7) {
        qs("#comment").addEventListener(
          "input",
          (e) => (d.comment = e.target.value),
        );
        qs("#documentsSigned").addEventListener("change", (e) => {
          d.documentsSigned = e.target.checked;
        });
      }

      // navigation
      const btnPrev = qs("#btn-prev");
      const btnNext = qs("#btn-next");
      btnPrev.addEventListener("click", () => {
        if (w.currentStep > 1) {
          w.currentStep -= 1;
          renderActiveTabContent();
        }
      });
      btnNext.addEventListener("click", () => {
        const ok = validateCurrentWizardStep();
        if (!ok) {
          renderActiveTabContent();
          return;
        }
        if (w.currentStep < wizardStepTitles.length) {
          w.currentStep += 1;
          renderActiveTabContent();
        } else {
          // Finish
          state.cardWizardFinished = true;
          state.savedCardWizard = null;
          showConfirm(
            "Карта успешно заказана. Завершить операцию и закрыть вкладку?",
            () => {
              const opTab = state.tabs.find(
                (t) => t.type === "operation" && t.payload.operationName === "Карты",
              );
              if (opTab) {
                closeTab(opTab.id);
              }
            },
            () => {
              // keep tab open
              renderActiveTabContent();
            }
          );
        }
      });
    }

    // ---------------- SMS SESSION ----------------

    let pendingOperationAfterSms = null;

    function openSmsModal() {
      const backdrop = qs("#sms-backdrop");
      const input = qs("#sms-code-input");
      const errorEl = qs("#sms-error");
      errorEl.style.display = "none";
      errorEl.textContent = "";
      input.value = "";
      backdrop.style.display = "flex";
      setTimeout(() => input.focus(), 0);
    }

    function closeSmsModal() {
      qs("#sms-backdrop").style.display = "none";
    }

    function initSmsModalHandlers() {
      const btnCancel = qs("#sms-cancel");
      const btnConfirm = qs("#sms-confirm");
      const input = qs("#sms-code-input");
      const errorEl = qs("#sms-error");
      btnCancel.addEventListener("click", () => {
        pendingOperationAfterSms = null;
        closeSmsModal();
      });
      btnConfirm.addEventListener("click", () => {
        const code = input.value.trim();
        if (code !== "1234") {
          errorEl.textContent = "Неверный код. Попробуйте ещё раз.";
          errorEl.style.display = "block";
          return;
        }
        // success
        state.sessionActive = true;
        updateSessionIndicator();
        closeSmsModal();
        if (pendingOperationAfterSms) {
          const opName = pendingOperationAfterSms;
          pendingOperationAfterSms = null;
          handleOperationClick(opName);
        }
      });
    }

    function updateSessionIndicator() {
      const btn = qs("#session-btn");
      if (state.sessionActive) {
        btn.textContent = `${CLIENT_SHORT_NAME} | В сессии`;
        btn.classList.remove("secondary");
        btn.classList.add("outline");
        btn.disabled = true;
      } else {
        btn.innerHTML =
          '<i class="fa-solid fa-play"></i> Начать сессию';
        btn.classList.add("secondary");
        btn.disabled = false;
      }
    }

    // ---------------- BEFOREUNLOAD ----------------

    window.addEventListener("beforeunload", (e) => {
      const hasCardWizardInProgress =
        state.tabs.some(
          (t) =>
            t.type === "operation" && t.payload.operationName === "Карты",
        ) && !state.cardWizardFinished;
      const hasPersonalWizardInProgress =
        state.tabs.some(
          (t) =>
            t.type === "operation" &&
            t.payload.operationName === "Изменение персональных данных",
        ) && !state.personalDataWizardFinished;
      if (hasCardWizardInProgress || hasPersonalWizardInProgress) {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    // ---------------- INIT ----------------

    function init() {
      ensureMainTab();
      qs("#client-fio").textContent = clientInfoFull.fio;
      renderTabs();
      renderDropdowns();
      initDropdownClicks();
      renderActiveTabContent();
      updateSessionIndicator();
      qs("#session-btn").addEventListener("click", () => {
        if (!state.sessionActive) {
          pendingOperationAfterSms = null;
          openSmsModal();
        }
      });
      initSmsModalHandlers();

      const modals = qsa('.modal-backdrop');
      modals.forEach(modal => {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.style.display = 'none';
          }
        });
      });

      initChatBot();
    }

    // ---------------- CHAT BOT ----------------
    const chatBotState = {
      messages: [],
      loading: false
    };

    const CHAT_BOT_LIMITS = {
      maxHistoryMessages: 12,     // сколько последних сообщений слать в модель
      maxMessageChars: 2000,      // максимум символов в одном сообщении (user/assistant)
      maxSystemPromptChars: 2000  // ограничение системного промпта на клиенте
    };

    function clampText(text, maxChars) {
      const s = String(text ?? '');
      if (!maxChars || s.length <= maxChars) return s;
      return s.slice(0, Math.max(0, maxChars - 1)) + '…';
    }

    function buildLimitedHistory(messages) {
      const maxN = CHAT_BOT_LIMITS.maxHistoryMessages;
      const sliced = maxN ? messages.slice(-maxN) : messages.slice();
      return sliced.map(m => ({
        role: m.role,
        content: clampText(m.content, CHAT_BOT_LIMITS.maxMessageChars)
      }));
    }

    function isObviouslyNonWorkQuestion(text) {
      const t = (text || '').toLowerCase();
      // Блокируем только явно "бытовое/развлекательное". Всё пограничное — пропускаем (решит system prompt).
      const nonWorkKeywords = [
        'анекдот', 'шутк', 'мем', 'стих', 'песня', 'фильм', 'сериал', 'игр', 'рецепт',
        'погода', 'гороскоп', 'сонник', 'таро', 'астрол', 'полит', 'выбор', 'религ',
        'знакомств', 'отношен', 'психолог', 'медицин', 'симптом', 'диагноз', 'лечение',
        'спорт', 'тренировк', 'диет', 'похуд', 'крипто', 'биткоин'
      ];
      return nonWorkKeywords.some(k => t.includes(k));
    }

    function getChatContext() {
      const tab = state.tabs.find(t => t.id === state.activeTabId);
      return {
        clientName: clientInfoFull.fio,
        currentTab: tab ? tab.title : 'Главная'
      };
    }

    function renderChatMessages() {
      const el = qs('#chat-messages');
      el.innerHTML = chatBotState.messages.map(m => {
        const cls = m.role === 'user' ? 'chat-msg user' : 'chat-msg bot' + (m.typing ? ' typing' : '');
        // Переносы строк сохраняются через CSS white-space: pre-wrap
        return `<div class="${cls}">${formatChatContent(m.content)}</div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatChatContent(text) {
      const raw = String(text ?? '');
      // Prefer full markdown rendering (lists, headings, tables, code), but keep it safe.
      if (window.marked && window.DOMPurify) {
        window.marked.setOptions({
          gfm: true,
          breaks: true,
          headerIds: false,
          mangle: false
        });
        const html = window.marked.parse(raw);
        return window.DOMPurify.sanitize(html, {
          USE_PROFILES: { html: true }
        });
      }
      // Fallback: escape HTML + minimal bold/italic
      const safe = escapeHtml(raw);
      return safe
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/(^|[^*])\*(?!\*)([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>')
        .replace(/(^|[^_])_(?!_)([^_\n]+?)_(?!_)/g, '$1<em>$2</em>');
    }

    function addChatMessage(role, content, typing) {
      chatBotState.messages.push({ role, content, typing: !!typing });
      renderChatMessages();
    }

    async function sendChatToApi(userText) {
      const cfg = CHAT_BOT_CONFIG;
      if (!cfg.apiUrl || !cfg.apiUrl.trim()) {
        return 'Настройте CHAT_BOT_CONFIG.apiUrl (ваш backend или AI API). Сейчас бот работает без подключения.';
      }
      const rawHistory = chatBotState.messages
        .filter(m => (m.role === 'user' || m.role === 'assistant') && !m.typing)
        .map(m => ({ role: m.role, content: m.content }));
      const history = buildLimitedHistory(rawHistory);

      const limitedUserText = clampText(userText, CHAT_BOT_LIMITS.maxMessageChars);
      const limitedSystemPrompt = clampText(cfg.systemPrompt || '', CHAT_BOT_LIMITS.maxSystemPromptChars);

      let body;
      if ((cfg.provider || '').toLowerCase() === 'mistral' || cfg.apiUrl.includes('api.mistral.ai')) {
        // Mistral API expects OpenAI-like schema: { model, messages: [{role, content}], ... }
        const messages = [];
        if (limitedSystemPrompt && limitedSystemPrompt.trim()) {
          messages.push({ role: 'system', content: limitedSystemPrompt.trim() });
        }
        history.forEach(m => messages.push({ role: m.role, content: m.content }));
        messages.push({ role: 'user', content: limitedUserText });

        body = {
          model: cfg.model || 'mistral-small-latest',
          messages,
          temperature: cfg.temperature ?? 0.2,
          max_tokens: cfg.maxTokens ?? 380
        };
      } else {
        // Backend/proxy schema (ваш сервер)
        body = {
          message: limitedUserText,
          history,
          context: getChatContext(),
          systemPrompt: limitedSystemPrompt,
          maxTokens: cfg.maxTokens ?? 380
        };
      }
      const headers = {
        'Content-Type': 'application/json'
      };
      if (cfg.apiKey && cfg.apiKey.trim()) headers['Authorization'] = 'Bearer ' + cfg.apiKey.trim();

      let res;
      try {
        res = await fetch(cfg.apiUrl, {
          method: 'POST',
          headers,
          body: JSON.stringify(body)
        });
      } catch (e) {
        // Частая причина при прямом вызове из браузера: CORS
        const msg = (e && e.message) ? e.message : String(e);
        return 'Не удалось выполнить запрос (возможен CORS). Рекомендуется вызывать Mistral через ваш backend-прокси. Детали: ' + msg;
      }
      if (!res.ok) {
        const err = await res.text();
        const brief = (err || '').toString().slice(0, 600);
        return 'Ошибка запроса (' + res.status + '): ' + (brief || res.statusText || 'unknown');
      }
      const data = await res.json();
      return data.reply != null ? data.reply : (data.text != null ? data.text : (data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : 'Нет ответа'));
    }

    async function handleChatSend(e) {
      e.preventDefault();
      const input = qs('#chat-bot-input');
      const sendBtn = qs('#chat-bot-send');
      const text = (input.value || '').trim();
      if (!text || chatBotState.loading) return;
      input.value = '';
      addChatMessage('user', text);
      addChatMessage('assistant', '…', true);
      chatBotState.loading = true;
      sendBtn.disabled = true;
      let reply;
      try {
        if (isObviouslyNonWorkQuestion(text)) {
          reply = 'Я помогаю только по рабочим вопросам отделения (продукты, регламенты, операции, сценарии в системе). Сформулируйте, пожалуйста, вопрос по работе — и я подскажу.';
        } else {
          reply = await sendChatToApi(text);
        }
      } catch (err) {
        reply = 'Ошибка: ' + (err.message || String(err));
      }
      chatBotState.loading = false;
      sendBtn.disabled = false;
      const lastBot = chatBotState.messages[chatBotState.messages.length - 1];
      if (lastBot && lastBot.role === 'assistant') {
        lastBot.content = reply;
        lastBot.typing = false;
      }
      renderChatMessages();
    }

    function initChatBot() {
      addChatMessage('assistant', 'Здравствуйте! Задайте вопрос по продуктам, регламенту или работе с клиентом.');
      qs('#chat-bot-toggle').addEventListener('click', () => {
        qs('#chat-bot-panel').classList.toggle('open');
        if (qs('#chat-bot-panel').classList.contains('open')) qs('#chat-bot-input').focus();
      });
      qs('#chat-bot-close').addEventListener('click', () => qs('#chat-bot-panel').classList.remove('open'));
      qs('#chat-bot-form').addEventListener('submit', handleChatSend);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
